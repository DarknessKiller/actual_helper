version: '3'

tasks:
  release:
    desc: "Get next version, tag, and push"
    cmds:
      - |
        CURRENT=$(go tool svu --prefix v current)
        NEXT=$(go tool svu --prefix v next)
        echo "Current: $CURRENT"
        echo "Next: $NEXT"
        git tag -a "$NEXT" -m "Release $NEXT"
        git push origin main --tags
        echo "Released $NEXT"

  current:
    desc: "Show current version"
    cmds:
      - go tool svu --prefix v current

  next:
    desc: "Show next version"
    cmds:
      - go tool svu --prefix v next
